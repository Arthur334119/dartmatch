name: dartmatch
description: "DartMatch – Die Dart-Community-App für Berliner Bars."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^10.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  uuid: ^4.0.0
  timeago: ^3.4.0
  google_fonts: ^6.0.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
